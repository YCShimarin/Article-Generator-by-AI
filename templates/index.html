<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Tech-Writer - ReiiLabs Portfolio</title>
    <link
      rel="icon"
      href="{{ url_for('static', filename='img/favicon.png') }}"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/tokyo-night-dark.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  </head>

  <body>
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>
          <a
            href="https://reiilabs.web.app/"
            style="color: white; text-decoration: none"
            >&lt;&lt; ReiiLABS vA.1</a
          >
        </h2>
      </div>

      <div class="search-box">
        <label>Search Archive</label>
        <input id="search" type="text" placeholder="Type to filter..." />
      </div>

      <div id="article-list" class="article-list"></div>

      <div style="padding: 15px">
        <button
          class="btn-secondary"
          style="width: 100%"
          onclick="loadArticles()"
        >
          ↻ REFRESH LIST
        </button>
      </div>
    </aside>

    <main class="main-content">
      <section class="generator-panel">
        <div class="input-group">
          <label>API Configuration</label>
          <input
            id="token"
            type="password"
            placeholder="OpenRouter Token (sk-...)"
          />
          <input
            id="model"
            type="text"
            placeholder="Model (e.g. google/gemma-3-2b-it:free)"
          />
        </div>

        <div class="input-group">
          <label>Article Queue</label>
          <textarea
            id="titles"
            placeholder="Enter titles (one per line)..."
          ></textarea>
        </div>

        <div class="action-area">
          <button class="btn-primary">EXECUTE GENERATION</button>
          <div id="status-bar">Flask Backend Ready...</div>
          <p style="font-size: 10px; color: #222">
            *your API token is safe because it is never stored in plain text.
          </p>
        </div>
      </section>

      <section id="preview" class="viewer-area">
        <div style="text-align: center; color: #999; margin-top: 100px">
          <h1>_DOCUMENT_VIEWER [FLASK]</h1>
          <p>Enter parameters above or select an article from the sidebar.</p>
        </div>
      </section>
    </main>

    <aside class="log-panel" id="log-panel">
      <div class="log-header">
        <span id="log-title" style="transition: opacity 0.3s">SYSTEM_LOG</span>
        <button
          class="btn-toggle-log"
          id="toggle-btn"
          onclick="
            event.stopPropagation();
            toggleLog();
          "
        >
          _MINIMIZE
        </button>
      </div>
      <div id="log-content" class="log-content"></div>
    </aside>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
